name: Run pytest
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Set up Python
        run: uv python install 3.x
      - name: Install dependencies
        run: uv add pytest pydantic
      - name: Run tests
        run: uv run pytest test_models.py -v
