name: Run pytest
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-caching: false   
      - name: Set up Python
        run: uv python install 3.12
      - name: Install dependencies
        run: uv pip install pytest pydantic --system
      - name: Run tests
        run: uv run pytest test_models.py -v
